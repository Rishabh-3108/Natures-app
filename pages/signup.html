<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Nature's Touch</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: var(--linen);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
    }

    .auth-card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 40px rgba(26, 46, 26, 0.1);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .icon {
      width: 60px;
      height: 60px;
      background: var(--forest);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .auth-logo h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--forest);
      margin-bottom: 6px;
    }

    .auth-logo p {
      font-size: 14px;
      color: #888;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffd0d0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: #f0fff4;
      border: 1px solid #c3e6cb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #155724;
      margin-bottom: 16px;
      display: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }

    .auth-footer a {
      color: var(--forest);
      font-weight: 600;
      text-decoration: none;
    }

    .benefits {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--warm-white);
      border-radius: 12px;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
    }

    /* Standardized button style based on your classes */
    .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      margin-top: 8px;
      background: var(--forest);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .form-group {
        margin-bottom: 15px;
    }
    
    .form-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 5px;
        color: #444;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
    }
  </style>
  <link rel="stylesheet" href="../css/pages.css">
</head>

<body>

  <nav>
    <div class="nav-auth-left">
      <a href="login.html" class="btn-primary btn-primary-sm">Login</a>
    </div>
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">🌿</div>
      <span class="nav-logo-text">Nature's Touch</span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-cart" onclick="window.location.href='cart.html'">🛒<span class="cart-badge"
          style="display:none">0</span></button>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon">🌱</div>
        <h2>Join Nature's Touch</h2>
        <p>Create your eco-conscious account today</p>
      </div>

      <div class="benefits">
        <div class="benefit-item"><span>🛒</span> Track your orders easily</div>
        <div class="benefit-item"><span>🌱</span> Report fallen trees near you</div>
        <div class="benefit-item"><span>💚</span> Exclusive eco member discounts</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="signupForm">
        <div class="two-col">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="Arjun" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Sharma" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="arjun@email.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="passwordInput" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </div>

        <button type="submit" class="btn-submit">Create Account →</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/main.js"></script>

  <script>
    // 1. Check if user is already logged in
    if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
      window.location.href = '../index.html';
    }

    // 2. Helper functions for UI
    function showError(msg) {
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
      const succEl = document.getElementById('successMsg');
      succEl.textContent = msg;
      succEl.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    // 3. Form Submission Logic
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Get values using specific IDs
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Simple Validation
      if (password.length < 6) {
        showError("Password must be at least 6 characters.");
        return;
      }

      if (password !== confirmPassword) {
        showError("Passwords do not match.");
        return;
      }

      const fullName = `${firstName} ${lastName}`;

      try {
        const response = await fetch("http://localhost:5000/api/auth/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ 
            name: fullName, 
            email: email, 
            password: password 
          })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess("🎉 Account created! Redirecting to login...");
          // Disable button to prevent double clicks
          document.querySelector('.btn-submit').disabled = true;
          
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } else {
          showError(data.msg || "Signup failed. Please try again.");
        }

      } catch (err) {
        console.error("Signup Error:", err);
        showError("Cannot connect to server. Is the backend running?");
      }
    });
  </script>
</body>

</html>
